<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="css/auth.css" />
</head>

<body>
    <div class="container">
        <h2>Register</h2>
        <p class="subtext">Create your account to get started.</p>

        <form class="form" id="registerForm">
            <div class="field">
                <label for="email">Email</label>
                <input class="input" id="email" type="email" placeholder="you@example.com" required />
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input class="input" id="password" type="password" placeholder="Create a strong password" required />
            </div>

            <button class="btn" id="registerBtn" type="submit">Register</button>

            <p id="message"></p>

            <div class="row">
                <span class="subtext" style="margin:0;">Already have an account?</span>
                <a class="link" href="login.html">Login</a>
            </div>
        </form>
    </div>

    <!-- API helper FIRST -->
    <script src="./js/api.js"></script>
    
    <!-- Page specific JS SECOND -->
    
    <script src="./js/register.js"></script>
</body>

</html>
