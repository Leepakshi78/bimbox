<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/auth.css" />
</head>

<body>
    <div class="container">
        <h2>Login</h2>
        <p class="subtext">Welcome back. Please enter your details.</p>

        <form class="form" id="loginForm">
            <div class="field">
                <label for="email">Email</label>
                <input class="input" id="email" type="email" placeholder="you@example.com" required />
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input class="input" id="password" type="password" placeholder="••••••••" required />
            </div>

            <button class="btn" id="loginBtn" type="submit">Login</button>

            <p id="message"></p>

            <div class="row">
                <span class="subtext" style="margin:0;">New user?</span>
                <a class="link" href="register.html">Register</a>
            </div>
        </form>
    </div>

    
    <!-- API helper FIRST -->
    <script src="./js/api.js"></script>
    
    <!-- Page specific JS SECOND -->
    <script src="./js/login.js"></script>
</body>

</html>
